<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NLC Tactical Training Timer</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-orange': '#ff6300',
                        'tactical-dark': '#050505',
                        'panel-bg': '#0c0c0c'
                    },
                    fontFamily: {
                        sans: ['Oswald', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Oswald:wght@400;600;700&display=swap');

        body {
            background-color: #050505;
            color: #e5e5e5;
            font-family: 'Oswald', sans-serif;
            overflow-x: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Custom Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }

        /* Progress bar transition */
        .progress-bar { transition: width 1s linear; }

        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: #ff6300; }
    </style>
</head>
<body>
    <div id="root" class="min-h-screen relative w-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- SVG ICONS ---
        const PlayIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        );
        
        const PauseIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
        );
        
        const ResetIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
        );

        // --- UTILITY: Voice Announcement ---
        // Uses the Web Speech API to provide audio cues natively
        const announce = (text) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Cancel any current speech
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1.05; // Slightly faster for a tactical feel
                utterance.pitch = 0.95; // Slightly deeper
                window.speechSynthesis.speak(utterance);
            }
        };

        // --- UTILITY: Screen Wake Lock Hook ---
        // Prevents screen from dimming/locking while timer is active
        const useWakeLock = (isActive) => {
            const wakeLockRef = useRef(null);

            useEffect(() => {
                const requestWakeLock = async () => {
                    try {
                        if ('wakeLock' in navigator && isActive) {
                            wakeLockRef.current = await navigator.wakeLock.request('screen');
                            console.log("Wake Lock active");
                        }
                    } catch (err) {
                        console.warn('Wake Lock error:', err);
                    }
                };

                const releaseWakeLock = async () => {
                    if (wakeLockRef.current !== null) {
                        await wakeLockRef.current.release();
                        wakeLockRef.current = null;
                        console.log("Wake Lock released");
                    }
                };

                if (isActive) {
                    requestWakeLock();
                } else {
                    releaseWakeLock();
                }

                // Re-acquire if visibility changes (e.g. user minimized and reopened browser)
                const handleVisibilityChange = () => {
                    if (document.visibilityState === 'visible' && isActive) {
                        requestWakeLock();
                    }
                };

                document.addEventListener('visibilitychange', handleVisibilityChange);

                return () => {
                    releaseWakeLock();
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                };
            }, [isActive]);
        };

        const YosudaTGUProtocol = () => {
            const [isRunning, setIsRunning] = useState(false);
            const [time, setTime] = useState(0); // in seconds
            
            useWakeLock(isRunning);

            // Phase definitions for the 8 minute (480 second) cyclical loop
            const getPhaseData = (totalSec) => {
                const sec = totalSec % 480;
                
                if (sec < 15)  return { name: "SPRINT (LEFT)", next: "TGU (LEFT)", left: 15 - sec, total: 15, audio: "Go. Sprint left.", color: "text-brand-orange" };
                if (sec < 45)  return { name: "TGU (LEFT)", next: "REST", left: 45 - sec, total: 30, audio: "Turkish get up left.", color: "text-white" };
                if (sec < 60)  return { name: "REST", next: "SPRINT (LEFT)", left: 60 - sec, total: 15, audio: "Rest.", color: "text-zinc-500" };
                
                if (sec < 75)  return { name: "SPRINT (LEFT)", next: "TGU (LEFT)", left: 75 - sec, total: 15, audio: "Go. Sprint left.", color: "text-brand-orange" };
                if (sec < 105) return { name: "TGU (LEFT)", next: "DEEP REST", left: 105 - sec, total: 30, audio: "Turkish get up left.", color: "text-white" };
                if (sec < 240) return { name: "DEEP REST", next: "SPRINT (RIGHT)", left: 240 - sec, total: 135, audio: "Deep rest. Breathe.", color: "text-zinc-500" };
                
                if (sec < 255) return { name: "SPRINT (RIGHT)", next: "TGU (RIGHT)", left: 255 - sec, total: 15, audio: "Go. Sprint right.", color: "text-brand-orange" };
                if (sec < 285) return { name: "TGU (RIGHT)", next: "REST", left: 285 - sec, total: 30, audio: "Turkish get up right.", color: "text-white" };
                if (sec < 300) return { name: "REST", next: "SPRINT (RIGHT)", left: 300 - sec, total: 15, audio: "Rest.", color: "text-zinc-500" };
                
                if (sec < 315) return { name: "SPRINT (RIGHT)", next: "TGU (RIGHT)", left: 315 - sec, total: 15, audio: "Go. Sprint right.", color: "text-brand-orange" };
                if (sec < 345) return { name: "TGU (RIGHT)", next: "DEEP REST", left: 345 - sec, total: 30, audio: "Turkish get up right.", color: "text-white" };
                if (sec < 480) return { name: "DEEP REST", next: "SPRINT (LEFT)", left: 480 - sec, total: 135, audio: "Deep rest. Breathe.", color: "text-zinc-500" };
                
                return { name: "STANDBY", next: "-", left: 0, total: 1, audio: "", color: "text-zinc-500" };
            };

            const currentPhase = getPhaseData(time);

            useEffect(() => {
                let interval;
                if (isRunning) {
                    interval = setInterval(() => {
                        setTime(t => {
                            const newTime = t + 1;
                            const sec = newTime % 480;
                            // Check exact boundaries to trigger voice lines
                            if (sec === 0) announce("Go. Sprint left.");
                            else if (sec === 15) announce("Turkish get up left.");
                            else if (sec === 45) announce("Rest.");
                            else if (sec === 60) announce("Go. Sprint left.");
                            else if (sec === 75) announce("Turkish get up left.");
                            else if (sec === 105) announce("Deep rest. Breathe.");
                            else if (sec === 240) announce("Go. Sprint right.");
                            else if (sec === 255) announce("Turkish get up right.");
                            else if (sec === 285) announce("Rest.");
                            else if (sec === 300) announce("Go. Sprint right.");
                            else if (sec === 315) announce("Turkish get up right.");
                            else if (sec === 345) announce("Deep rest. Breathe.");

                            return newTime;
                        });
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [isRunning]);

            const handleToggle = () => {
                if (!isRunning && time === 0) {
                    announce("Begin Yosuda and TGU protocol. Go. Sprint left.");
                }
                setIsRunning(!isRunning);
            };

            const handleReset = () => {
                setIsRunning(false);
                setTime(0);
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            };

            const formatTotalTime = (s) => `${Math.floor(s / 60).toString().padStart(2, '0')}:${(s % 60).toString().padStart(2, '0')}`;
            const progressPercent = ((currentPhase.total - currentPhase.left) / currentPhase.total) * 100;

            return (
                <div className="flex-1 flex flex-col items-center justify-center p-6 w-full max-w-lg mx-auto animate-fade-in">
                    
                    {/* Header Info */}
                    <div className="w-full flex justify-between items-end border-b border-zinc-800 pb-4 mb-8">
                        <div>
                            <div className="text-[10px] text-brand-orange uppercase tracking-[0.2em] font-bold">Protocol</div>
                            <div className="text-xl font-mono text-white">Yosuda & TGU</div>
                        </div>
                        <div className="text-right">
                            <div className="text-[10px] text-zinc-500 uppercase tracking-[0.2em] font-bold">Total Time</div>
                            <div className="text-xl font-mono text-zinc-300">{formatTotalTime(time)}</div>
                        </div>
                    </div>

                    {/* Main Timer HUD */}
                    <div className="w-full bg-panel-bg border border-zinc-800 rounded-xl p-8 flex flex-col items-center justify-center relative overflow-hidden shadow-2xl">
                        
                        <div className="text-[10px] uppercase tracking-widest text-zinc-500 font-bold mb-2">Current Phase</div>
                        <div className={`text-4xl md:text-5xl font-black italic uppercase text-center leading-none mb-6 ${currentPhase.color}`}>
                            {time === 0 && !isRunning ? "READY" : currentPhase.name}
                        </div>

                        {/* Progress Bar */}
                        <div className="w-full bg-zinc-900 h-2 mb-6 rounded-full overflow-hidden">
                            <div 
                                className={`h-full progress-bar ${currentPhase.name.includes('REST') ? 'bg-zinc-500' : 'bg-brand-orange'}`} 
                                style={{ width: `${time === 0 && !isRunning ? 0 : progressPercent}%` }}
                            ></div>
                        </div>

                        {/* Phase Countdown */}
                        <div className="text-8xl font-mono font-bold text-white tracking-tighter tabular-nums drop-shadow-md">
                            {time === 0 && !isRunning ? "0" : currentPhase.left}
                        </div>

                        <div className="text-xs uppercase tracking-widest text-zinc-600 font-bold mt-6">
                            Up Next: <span className="text-zinc-400">{time === 0 && !isRunning ? "SPRINT (LEFT)" : currentPhase.next}</span>
                        </div>
                    </div>

                    {/* Controls */}
                    <div className="mt-8 flex items-center justify-center gap-6 w-full">
                        <button 
                            onClick={handleToggle}
                            className="flex-1 h-16 rounded bg-brand-orange text-black font-black uppercase tracking-widest flex items-center justify-center hover:bg-[#e65900] transition-colors shadow-[0_0_15px_rgba(255,99,0,0.3)]"
                        >
                            {isRunning ? "PAUSE" : (time === 0 ? "COMMENCE" : "RESUME")}
                        </button>
                        <button 
                            onClick={handleReset}
                            className="w-16 h-16 rounded border border-zinc-700 flex items-center justify-center text-zinc-500 hover:text-white hover:border-white transition-all"
                            title="Reset Timer"
                        >
                            <ResetIcon />
                        </button>
                    </div>

                </div>
            );
        };

        const QDSnatchProtocol = () => {
            const [phase, setPhase] = useState('setup'); // 'setup', 'active', 'complete'
            const [loadDice, setLoadDice] = useState(0);
            const [isRolling, setIsRolling] = useState(false);
            
            const [protocol, setProtocol] = useState('5/4');
            const [seriesCount, setSeriesCount] = useState(3);
            
            const [time, setTime] = useState(0);
            const [currentSeries, setCurrentSeries] = useState(1);
            const [isRunning, setIsRunning] = useState(false);

            useWakeLock(isRunning);

            const seriesDuration = protocol === '5/4' ? 180 : 240;

            const rollDice = () => {
                setIsRolling(true);
                let rolls = 0;
                const interval = setInterval(() => {
                    setLoadDice(Math.floor(Math.random() * 6) + 1);
                    rolls++;
                    if (rolls > 10) {
                        clearInterval(interval);
                        setIsRolling(false);
                    }
                }, 80);
            };

            const getLoadData = (val) => {
                if (val === 0) return { name: "AWAITING ROLL", color: "text-zinc-600", desc: "Roll to determine load." };
                if (val <= 2) return { name: "LIGHT (40-50%)", color: "text-brand-orange", desc: "Active recovery, speed, technique." };
                if (val <= 4) return { name: "MEDIUM (60-70%)", color: "text-white", desc: "Crisp lockouts, structural density." };
                return { name: "HEAVY (80-85%)", color: "text-red-500", desc: "Absolute force. Maximum tension." };
            };

            const loadData = getLoadData(loadDice);

            useEffect(() => {
                let interval;
                if (isRunning) {
                    interval = setInterval(() => {
                        setTime(t => {
                            const newTime = t + 1;
                            
                            // Check triggers BEFORE updating phase
                            if (protocol === '5/4') {
                                if (newTime === 30 || newTime === 60 || newTime === 90) announce("Go.");
                                else if (newTime === 120) announce("Deep rest. Focus on breathing.");
                                else if (newTime === 170 && currentSeries < seriesCount) announce("Ten seconds.");
                            } else {
                                if (newTime === 60) announce("Go.");
                                else if (newTime === 90) announce("Deep rest. Focus on breathing.");
                                else if (newTime === 230 && currentSeries < seriesCount) announce("Ten seconds.");
                            }

                            // Series Boundary
                            if (newTime >= seriesDuration) {
                                if (currentSeries < seriesCount) {
                                    setCurrentSeries(cs => cs + 1);
                                    announce(`Series ${currentSeries + 1}. Go.`);
                                    return 0; // Reset time for next series
                                } else {
                                    setIsRunning(false);
                                    setPhase('complete');
                                    announce("Protocol complete. Outstanding work.");
                                    return newTime;
                                }
                            }
                            return newTime;
                        });
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [isRunning, currentSeries, protocol, seriesCount, seriesDuration]);

            const handleStart = () => {
                setPhase('active');
                setIsRunning(true);
                announce(`Begin Snatch Protocol. Series 1. Go.`);
            };

            const handleReset = () => {
                setIsRunning(false);
                setPhase('setup');
                setTime(0);
                setCurrentSeries(1);
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            };

            const formatTime = (s) => `${Math.floor(s / 60).toString().padStart(2, '0')}:${(s % 60).toString().padStart(2, '0')}`;
            
            // Calculate current status for visual display
            let currentStatus = "WORK";
            if (protocol === '5/4') {
                if (time > 15 && time < 30) currentStatus = "RECOVER";
                else if (time > 45 && time < 60) currentStatus = "RECOVER";
                else if (time > 75 && time < 90) currentStatus = "RECOVER";
                else if (time >= 120) currentStatus = "DEEP REST";
            } else {
                if (time > 30 && time < 60) currentStatus = "RECOVER";
                else if (time >= 90) currentStatus = "DEEP REST";
            }

            return (
                <div className="flex-1 flex flex-col items-center p-6 w-full max-w-lg mx-auto animate-fade-in">
                    
                    {phase === 'setup' && (
                        <div className="w-full flex flex-col items-center">
                            <h2 className="text-[10px] font-mono text-zinc-500 uppercase tracking-[0.2em] mb-6 w-full text-center border-b border-zinc-800 pb-2">Mission Configuration</h2>
                            
                            {/* Dice Roll Gateway */}
                            <div className="w-full bg-panel-bg border border-zinc-800 rounded-xl p-6 flex flex-col items-center mb-6 shadow-lg">
                                <div className="text-[10px] uppercase tracking-widest text-zinc-500 font-bold mb-4">Stochastic Load Selector</div>
                                <div className={`text-3xl font-black italic uppercase tracking-wider mb-2 ${loadData.color} ${isRolling ? 'animate-pulse' : ''}`}>
                                    {isRolling ? "CALCULATING..." : loadData.name}
                                </div>
                                <p className="text-xs text-zinc-400 font-mono text-center mb-6 h-8">{!isRolling && loadData.desc}</p>
                                
                                <button 
                                    onClick={rollDice}
                                    disabled={isRolling}
                                    className="w-full py-3 rounded border border-brand-orange text-brand-orange font-bold uppercase tracking-widest hover:bg-brand-orange hover:text-black transition-all text-xs"
                                >
                                    Roll Dice
                                </button>
                            </div>

                            {/* Options */}
                            <div className="w-full flex gap-4 mb-6">
                                <div className="flex-1">
                                    <label className="text-[10px] text-zinc-500 uppercase mb-2 block font-bold tracking-widest">Protocol</label>
                                    <div className="flex bg-zinc-900 p-1 rounded border border-zinc-800">
                                        <button onClick={() => setProtocol('5/4')} className={`flex-1 py-2 text-xs font-bold transition-all rounded ${protocol === '5/4' ? 'bg-brand-orange text-black' : 'text-zinc-500'}`}>5/4 (Power)</button>
                                        <button onClick={() => setProtocol('10/2')} className={`flex-1 py-2 text-xs font-bold transition-all rounded ${protocol === '10/2' ? 'bg-brand-orange text-black' : 'text-zinc-500'}`}>10/2 (Mass)</button>
                                    </div>
                                </div>
                            </div>

                            <div className="w-full mb-8">
                                <label className="text-[10px] text-zinc-500 uppercase mb-2 block font-bold tracking-widest">Series Count</label>
                                <div className="flex gap-2">
                                    {[2, 3, 4, 5].map(num => (
                                        <button 
                                            key={num} 
                                            onClick={() => setSeriesCount(num)}
                                            className={`flex-1 py-3 text-sm font-black font-mono rounded border transition-all ${seriesCount === num ? 'border-brand-orange bg-brand-orange/10 text-brand-orange' : 'border-zinc-800 bg-zinc-900 text-zinc-500 hover:border-zinc-600'}`}
                                        >
                                            {num}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <button 
                                onClick={handleStart}
                                disabled={loadDice === 0}
                                className="w-full h-16 rounded bg-brand-orange text-black font-black uppercase tracking-widest flex items-center justify-center hover:bg-[#e65900] transition-all disabled:opacity-30 disabled:hover:bg-brand-orange"
                            >
                                COMMENCE
                            </button>
                        </div>
                    )}

                    {phase === 'active' && (
                        <div className="w-full flex flex-col items-center animate-slide-up">
                            {/* Header Info */}
                            <div className="w-full flex justify-between items-end border-b border-zinc-800 pb-4 mb-8">
                                <div>
                                    <div className="text-[10px] text-brand-orange uppercase tracking-[0.2em] font-bold">Q&D Snatch</div>
                                    <div className="text-xl font-mono text-white">Series {currentSeries} <span className="text-zinc-600 text-sm">/ {seriesCount}</span></div>
                                </div>
                                <div className="text-right">
                                    <div className="text-[10px] text-zinc-500 uppercase tracking-[0.2em] font-bold">Protocol</div>
                                    <div className="text-xl font-mono text-zinc-300">{protocol}</div>
                                </div>
                            </div>

                            {/* Main Timer HUD */}
                            <div className="w-full bg-panel-bg border border-zinc-800 rounded-xl p-8 flex flex-col items-center justify-center relative overflow-hidden shadow-2xl">
                                
                                <div className="text-[10px] uppercase tracking-widest text-zinc-500 font-bold mb-2">Current Phase</div>
                                <div className={`text-5xl md:text-6xl font-black italic uppercase text-center leading-none mb-6 transition-colors duration-300 ${currentStatus === 'WORK' ? 'text-white' : currentStatus === 'DEEP REST' ? 'text-brand-orange' : 'text-zinc-600'}`}>
                                    {currentStatus}
                                </div>

                                {/* Progress Bar */}
                                <div className="w-full bg-zinc-900 h-2 mb-6 rounded-full overflow-hidden">
                                    <div 
                                        className={`h-full progress-bar ${currentStatus === 'DEEP REST' ? 'bg-brand-orange' : 'bg-white'}`} 
                                        style={{ width: `${(time / seriesDuration) * 100}%` }}
                                    ></div>
                                </div>

                                {/* Countdown */}
                                <div className="text-8xl font-mono font-bold text-white tracking-tighter tabular-nums drop-shadow-md">
                                    {formatTime(seriesDuration - time)}
                                </div>
                            </div>

                            {/* Controls */}
                            <div className="mt-8 flex items-center justify-center gap-6 w-full">
                                <button 
                                    onClick={() => setIsRunning(!isRunning)}
                                    className="flex-1 h-16 rounded border border-brand-orange text-brand-orange font-black uppercase tracking-widest flex items-center justify-center hover:bg-brand-orange hover:text-black transition-colors"
                                >
                                    {isRunning ? "PAUSE" : "RESUME"}
                                </button>
                                <button 
                                    onClick={handleReset}
                                    className="w-16 h-16 rounded border border-zinc-700 flex items-center justify-center text-zinc-500 hover:text-white hover:border-white transition-all"
                                >
                                    <ResetIcon />
                                </button>
                            </div>
                        </div>
                    )}

                    {phase === 'complete' && (
                        <div className="w-full flex flex-col items-center justify-center text-center animate-fade-in py-12">
                            <h1 className="text-4xl font-black text-white italic mb-2 uppercase">Protocol Complete</h1>
                            <div className="w-16 h-1 bg-brand-orange mx-auto mb-8"></div>
                            <div className="text-zinc-400 font-mono text-sm mb-12">
                                Executed {seriesCount} Series of Q&D {protocol}<br/>
                                Total Volume Completed
                            </div>
                            <button 
                                onClick={handleReset}
                                className="w-full h-16 rounded bg-brand-orange text-black font-black uppercase tracking-widest flex items-center justify-center hover:bg-[#e65900] transition-colors"
                            >
                                Reset Terminal
                            </button>
                        </div>
                    )}

                </div>
            );
        };

        const DFWProtocol = () => {
            const [durationMinutes, setDurationMinutes] = useState(30);
            const [timeLeft, setTimeLeft] = useState(30 * 60);
            const [isRunning, setIsRunning] = useState(false);
            
            // Volume Tracker State
            const [count1, setCount1] = useState(0);
            const [count2, setCount2] = useState(0);
            const [count3, setCount3] = useState(0);

            useWakeLock(isRunning);

            // Update timer if duration is changed while idle
            useEffect(() => {
                if (!isRunning && timeLeft % 60 === 0) {
                    setTimeLeft(durationMinutes * 60);
                }
            }, [durationMinutes]);

            useEffect(() => {
                let timer;
                if (isRunning && timeLeft > 0) {
                    timer = setInterval(() => {
                        setTimeLeft(prev => {
                            const newTime = prev - 1;
                            
                            // Voice Cues
                            if (newTime === Math.floor(durationMinutes * 60 / 2)) announce("Halfway there.");
                            else if (newTime === 300) announce("Five minutes remaining. Stay tight.");
                            else if (newTime === 60) announce("One minute remaining. Finish strong.");
                            
                            return newTime;
                        });
                    }, 1000);
                } else if (timeLeft === 0 && isRunning) {
                    setIsRunning(false);
                    announce("Time. Protocol complete. Great work.");
                }
                return () => clearInterval(timer);
            }, [isRunning, timeLeft, durationMinutes]);

            const handleToggle = () => {
                if (!isRunning && timeLeft === durationMinutes * 60) {
                    announce(`Begin Dry Fighting Weight protocol. ${durationMinutes} minutes on the clock.`);
                }
                setIsRunning(!isRunning);
            };

            const handleReset = () => {
                setIsRunning(false);
                setTimeLeft(durationMinutes * 60);
                setCount1(0);
                setCount2(0);
                setCount3(0);
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            return (
                <div className="flex-1 flex flex-col items-center justify-start p-6 w-full max-w-lg mx-auto animate-fade-in">
                    
                    {/* Pre-Start Configuration */}
                    {!isRunning && timeLeft === durationMinutes * 60 && (
                        <div className="w-full flex bg-panel-bg rounded p-1 mb-6 border border-zinc-800">
                            <button 
                                onClick={() => setDurationMinutes(20)}
                                className={`flex-1 py-3 text-xs font-bold uppercase tracking-widest transition-all rounded ${durationMinutes === 20 ? 'bg-brand-orange text-black' : 'text-zinc-500 hover:text-zinc-300'}`}
                            >
                                20 Minutes
                            </button>
                            <button 
                                onClick={() => setDurationMinutes(30)}
                                className={`flex-1 py-3 text-xs font-bold uppercase tracking-widest transition-all rounded ${durationMinutes === 30 ? 'bg-brand-orange text-black' : 'text-zinc-500 hover:text-zinc-300'}`}
                            >
                                30 Minutes
                            </button>
                        </div>
                    )}

                    {/* Main Timer Display */}
                    <div className="py-6 flex flex-col items-center">
                        <div className={`font-black text-8xl md:text-9xl tracking-tighter tabular-nums transition-colors duration-300 ${isRunning ? 'text-brand-orange drop-shadow-[0_0_20px_rgba(255,99,0,0.3)]' : 'text-white'}`}>
                            {formatTime(timeLeft)}
                        </div>
                        <div className="mt-8 flex items-center justify-center gap-6 w-full">
                            <button 
                                onClick={handleToggle}
                                className={`h-16 px-12 rounded border-2 transition-all flex items-center justify-center font-black uppercase tracking-widest ${isRunning ? 'border-brand-orange text-brand-orange hover:bg-brand-orange/10' : 'bg-brand-orange border-brand-orange text-black hover:bg-[#e65900]'}`}
                            >
                                {isRunning ? "PAUSE" : (timeLeft === durationMinutes * 60 ? "START" : "RESUME")}
                            </button>
                            <button 
                                onClick={handleReset}
                                className="w-16 h-16 rounded border border-zinc-700 flex items-center justify-center text-zinc-500 hover:text-white hover:border-white transition-all"
                                title="Reset Data"
                            >
                                <ResetIcon />
                            </button>
                        </div>
                    </div>

                    {/* Ladder Tracker */}
                    <div className="w-full mt-8 pt-8 border-t border-zinc-800/80 animate-slide-up">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="text-[11px] tracking-[0.2em] text-zinc-500 font-bold uppercase">Volume Tracker</h3>
                            <div className="text-[10px] bg-brand-orange/20 text-brand-orange border border-brand-orange/30 px-3 py-1 rounded font-mono font-bold">
                                TOTAL REPS: {(count1 * 1) + (count2 * 2) + (count3 * 3)}
                            </div>
                        </div>
                        
                        <div className="grid grid-cols-3 gap-4">
                            {/* 1 Rep */}
                            <div className="flex flex-col items-center">
                                <span className="text-[10px] text-brand-orange font-bold uppercase tracking-wider mb-2">1 Rep</span>
                                <button onClick={() => setCount1(c => c + 1)} className="w-full aspect-square rounded-xl bg-panel-bg border border-zinc-800 hover:border-brand-orange text-3xl font-black text-white flex items-center justify-center transition-all active:scale-95 shadow-lg">
                                    {count1}
                                </button>
                                <button onClick={() => setCount1(c => Math.max(0, c - 1))} className="mt-3 text-zinc-600 hover:text-zinc-400 p-2 uppercase text-[9px] font-bold tracking-widest">Undo</button>
                            </div>

                            {/* 2 Reps */}
                            <div className="flex flex-col items-center">
                                <span className="text-[10px] text-brand-orange font-bold uppercase tracking-wider mb-2">2 Reps</span>
                                <button onClick={() => setCount2(c => c + 1)} className="w-full aspect-square rounded-xl bg-panel-bg border border-zinc-800 hover:border-brand-orange text-3xl font-black text-white flex items-center justify-center transition-all active:scale-95 shadow-lg">
                                    {count2}
                                </button>
                                <button onClick={() => setCount2(c => Math.max(0, c - 1))} className="mt-3 text-zinc-600 hover:text-zinc-400 p-2 uppercase text-[9px] font-bold tracking-widest">Undo</button>
                            </div>

                            {/* 3 Reps */}
                            <div className="flex flex-col items-center">
                                <span className="text-[10px] text-brand-orange font-bold uppercase tracking-wider mb-2">3 Reps</span>
                                <button onClick={() => setCount3(c => c + 1)} className="w-full aspect-square rounded-xl bg-panel-bg border border-zinc-800 hover:border-brand-orange text-3xl font-black text-white flex items-center justify-center transition-all active:scale-95 shadow-lg">
                                    {count3}
                                </button>
                                <button onClick={() => setCount3(c => Math.max(0, c - 1))} className="mt-3 text-zinc-600 hover:text-zinc-400 p-2 uppercase text-[9px] font-bold tracking-widest">Undo</button>
                            </div>
                        </div>
                    </div>

                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('YOSUDA'); // 'YOSUDA', 'SNATCH', 'DFW'

            // Clean up speech synthesis when unmounting or switching tabs
            useEffect(() => {
                return () => {
                    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
                };
            }, [activeTab]);

            return (
                <div className="flex flex-col min-h-screen relative z-10 w-full">
                    
                    {/* Aesthetic Background Elements */}
                    <div className="fixed inset-0 z-0 pointer-events-none">
                        {/* The requested banner image is applied as a dark, blended background */}
                        <img src="banner 2.jpg" alt="" className="w-full h-full object-cover opacity-5" onError={(e) => e.target.style.display = 'none'} />
                        <div className="absolute inset-0 bg-gradient-to-b from-tactical-dark/50 via-tactical-dark to-tactical-dark"></div>
                    </div>

                    {/* App Content */}
                    <div className="relative z-10 flex-1 flex flex-col w-full max-w-2xl mx-auto">
                        
                        {/* Header & Logo */}
                        <header className="pt-8 pb-4 flex flex-col items-center justify-center w-full">
                            <img 
                                src="nlc_logo_optimized.png" 
                                alt="NLC Logo" 
                                className="h-16 md:h-20 w-auto object-contain mb-2" 
                                onError={(e) => {
                                    // Fallback if logo is missing locally
                                    e.target.outerHTML = '<h1 class="text-3xl font-black italic tracking-wide text-white mb-2">NLC <span class="text-brand-orange">PERFORMANCE</span></h1>'
                                }} 
                            />
                            <div className="text-[10px] tracking-[0.4em] text-zinc-500 font-bold uppercase">Tactical Terminal</div>
                        </header>

                        {/* Tab Navigation */}
                        <nav className="w-full px-4 md:px-6 pt-4 mb-2">
                            <div className="flex border-b border-zinc-800 justify-between">
                                <button 
                                    onClick={() => setActiveTab('YOSUDA')}
                                    className={`flex-1 pb-4 text-[10px] md:text-xs font-bold uppercase tracking-widest transition-all ${activeTab === 'YOSUDA' ? 'text-brand-orange border-b-2 border-brand-orange' : 'text-zinc-600 hover:text-zinc-400 border-b-2 border-transparent'}`}
                                >
                                    Yosuda & TGU
                                </button>
                                <button 
                                    onClick={() => setActiveTab('SNATCH')}
                                    className={`flex-1 pb-4 text-[10px] md:text-xs font-bold uppercase tracking-widest transition-all ${activeTab === 'SNATCH' ? 'text-brand-orange border-b-2 border-brand-orange' : 'text-zinc-600 hover:text-zinc-400 border-b-2 border-transparent'}`}
                                >
                                    Q&D Snatch
                                </button>
                                <button 
                                    onClick={() => setActiveTab('DFW')}
                                    className={`flex-1 pb-4 text-[10px] md:text-xs font-bold uppercase tracking-widest transition-all ${activeTab === 'DFW' ? 'text-brand-orange border-b-2 border-brand-orange' : 'text-zinc-600 hover:text-zinc-400 border-b-2 border-transparent'}`}
                                >
                                    D.F.W.
                                </button>
                            </div>
                        </nav>

                        {/* Protocol Container */}
                        <main className="flex-1 flex flex-col relative w-full overflow-y-auto">
                            {activeTab === 'YOSUDA' && <YosudaTGUProtocol />}
                            {activeTab === 'SNATCH' && <QDSnatchProtocol />}
                            {activeTab === 'DFW' && <DFWProtocol />}
                        </main>

                        {/* Footer */}
                        <footer className="w-full text-center py-6 mt-auto">
                            <span className="text-[9px] font-bold tracking-[0.4em] text-zinc-700 uppercase">Adapt. Recover. Master.</span>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
